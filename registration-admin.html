<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELWOIC Administration Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <nav class="bg-indigo-900 text-white shadow-md px-6 py-4 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <i class="fa-solid fa-shield-halved text-2xl text-indigo-300"></i>
      <span class="text-xl font-bold tracking-wide">ELWOIC Admin Portal</span>
    </div>
    <div class="flex items-center space-x-2">
      <label for="adminToken" class="text-xs text-indigo-200 font-medium hidden md:block">Admin Passkey:</label>
      <input type="password" id="adminToken" placeholder="Enter X-Admin-Token" 
        class="bg-indigo-800 border border-indigo-700 text-sm rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-white w-48 transition-all">
      <button onclick="loadDashboardData()" class="bg-indigo-500 hover:bg-indigo-400 font-medium text-sm px-4 py-1.5 rounded transition-colors shadow">
        <i class="fa-solid fa-sync mr-1.5"></i>Fetch
      </button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">

    <section class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Households</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Household" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 330</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Businesses</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Business" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 100</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Farms</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Farm" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 50</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Institutions</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Institution" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 50</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between col-span-2 md:col-span-1">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Others</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Other" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 100</span>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-5 border-b border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-50/50">
        <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto items-center">
          <div class="relative w-full md:w-72">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="searchBar" oninput="filterTable()" placeholder="Search Name, WhatsApp or ID..." 
              class="w-full bg-white border border-slate-300 text-sm rounded-lg pl-9 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
          </div>
          <select id="filterFolder" onchange="filterTable()" 
            class="w-full md:w-48 bg-white border border-slate-300 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All Categories</option>
            <option value="Household">Household</option>
            <option value="Business">Business</option>
            <option value="Farm">Farm</option>
            <option value="Institution">Institution</option>
            <option value="Other">Other</option>
          </select>
          <select id="filterRegion" onchange="filterTable()" 
            class="w-full md:w-36 bg-white border border-slate-300 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All Regions</option>
            <option value="N">North (N)</option>
            <option value="S">South (S)</option>
            <option value="E">East (E)</option>
            <option value="W">West (W)</option>
          </select>
        </div>
        <button onclick="exportToCSV()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm px-4 py-2 rounded-lg transition-colors shadow flex items-center justify-center">
          <i class="fa-solid fa-file-excel mr-2"></i>Export CSV
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-100/70 border-b border-slate-200 text-xs font-semibold uppercase tracking-wider text-slate-500">
              <th class="py-3.5 px-4">Reg Number</th>
              <th class="py-3.5 px-4">Name</th>
              <th class="py-3.5 px-4">WhatsApp</th>
              <th class="py-3.5 px-4">Location</th>
              <th class="py-3.5 px-4">Ward / Region</th>
              <th class="py-3.5 px-4">Flags</th>
              <th class="py-3.5 px-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="registrationTableBody" class="divide-y divide-slate-200 text-sm text-slate-600">
            <tr>
              <td colspan="7" class="text-center py-10 text-slate-400">
                <i class="fa-solid fa-key text-2xl mb-2 block"></i>
                Provide your Admin Passkey token at the top and click Fetch.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const WORKER_BASE_URL = "https://elwoic-registration.bold-waterfall-0d01.workers.dev";
    let MASTER_DATASET = []; // Stores localized record array objects 

    // Retrieve global dataset structural array securely from worker
    async function loadDashboardData() {
      const token = document.getElementById("adminToken").value.trim();
      if(!token) {
        alert("Please enter your Administrative Security Passkey token.");
        return;
      }

      const tableBody = document.getElementById("registrationTableBody");
      tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-slate-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Accessing secure cloud database paths...</td></tr>`;

      try {
        const response = await fetch(`${WORKER_BASE_URL}/admin/all`, {
          method: "GET",
          headers: { "X-Admin-Token": token }
        });

        const result = await response.json();
        if(!response.ok || !result.success) {
          throw new Error(result.error || "Authentication verification validation failed.");
        }

        // Reset and populate localized tracking tables
        MASTER_DATASET = [];
        const folders = ["Household", "Business", "Farm", "Institution", "Other"];
        
        // Zero out numeric counters initially
        folders.forEach(f => document.getElementById(`count-${f}`).innerText = "0");

        if(result.data) {
          for (const folder of Object.keys(result.data)) {
            const contents = result.data[folder];
            if(contents) {
              const currentFolderCount = Object.keys(contents).length;
              if(document.getElementById(`count-${folder}`)) {
                document.getElementById(`count-${folder}`).innerText = currentFolderCount;
              }
              
              // Flatten structures into linear array models for straightforward UI processing
              for(const regId of Object.keys(contents)) {
                MASTER_DATASET.push({
                  ...contents[regId],
                  _folder: folder // append context tracking parameters locally
                });
              }
            }
          }
        }

        renderTable(MASTER_DATASET);

      } catch(err) {
        alert("Error loading data: " + err.message);
        tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-rose-500 font-medium"><i class="fa-solid fa-circle-exclamation mr-2"></i>${err.message}</td></tr>`;
      }
    }

    // Map linear structural rows down into active DOM tables components
    function renderTable(dataset) {
      const tableBody = document.getElementById("registrationTableBody");
      if(dataset.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-slate-400">No active registration files matched requirements.</td></tr>`;
        return;
      }

      tableBody.innerHTML = dataset.map(row => {
        // Collect safety alert tags values configurations dynamically
        let flags = [];
        if(row.near_riverbank) flags.push('<span class="bg-blue-100 text-blue-700 text-[10px] px-1.5 py-0.5 rounded font-medium">River</span>');
        if(row.severe_waterlogging) flags.push('<span class="bg-cyan-100 text-cyan-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Flood</span>');
        if(row.landslide_prone) flags.push('<span class="bg-amber-100 text-amber-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Landslide</span>');
        if(row.high_altitude) flags.push('<span class="bg-purple-100 text-purple-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Alt</span>');

        return `
          <tr class="hover:bg-slate-50/80 transition-colors">
            <td class="py-3 px-4 font-mono text-xs text-indigo-900 font-bold">${row.reg_number}</td>
            <td class="py-3 px-4 font-medium text-slate-900">${row.name}</td>
            <td class="py-3 px-4">
              <a href="https://wa.me/${row.whatsapp.replace(/\D/g,'')}" target="_blank" class="text-emerald-600 hover:underline inline-flex items-center">
                <i class="fa-brands fa-whatsapp mr-1 text-sm"></i>${row.whatsapp}
              </a>
            </td>
            <td class="py-3 px-4 max-w-xs truncate text-xs">
              <span class="font-medium text-slate-800">${row.house_name}</span>, ${row.post_office} (${row.pincode})
            </td>
            <td class="py-3 px-4 text-xs">
              Ward ${row.ward_number}: <span class="text-slate-400">${row.ward_name}</span> 
              <span class="ml-1.5 bg-slate-200 text-slate-700 px-1 py-0.2 rounded font-bold">${row.region}</span>
            </td>
            <td class="py-3 px-4"><div class="flex flex-wrap gap-1">${flags.join('') || '<span class="text-slate-300 text-xs">-</span>'}</div></td>
            <td class="py-3 px-4 text-right">
              <button onclick="deleteEntry('${row.reg_number}', '${row._folder}')" class="text-rose-600 hover:text-rose-950 p-1.5 rounded hover:bg-rose-50 transition-colors" title="Delete Profile Record">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Intercept data streams locally dynamically applying search matrices values configurations
    function filterTable() {
      const query = document.getElementById("searchBar").value.toLowerCase().trim();
      const folderFilter = document.getElementById("filterFolder").value;
      const regionFilter = document.getElementById("filterRegion").value;

      const filtered = MASTER_DATASET.filter(row => {
        const matchesQuery = row.name.toLowerCase().includes(query) || 
                             row.whatsapp.includes(query) || 
                             row.reg_number.toLowerCase().includes(query);
        const matchesFolder = folderFilter === "" || row._folder === folderFilter;
        const matchesRegion = regionFilter === "" || row.region === regionFilter;

        return matchesQuery && matchesFolder && matchesRegion;
      });

      renderTable(filtered);
    }

    // Securely fire delete commands tracking dynamic payload layouts paths parameters directly
    async function deleteEntry(regNumber, folder) {
      if(!confirm(`Are you absolutely sure you want to completely erase profile record ${regNumber}? This cannot be undone.`)) return;

      const token = document.getElementById("adminToken").value.trim();
      try {
        const response = await fetch(`${WORKER_BASE_URL}/admin/delete?reg_number=${regNumber}&folder=${folder}`, {
          method: "DELETE",
          headers: { "X-Admin-Token": token }
        });

        const result = await response.json();
        if(!response.ok || !result.success) throw new Error(result.error || "Deletion parameters rejected.");

        alert(`Record Profile ${regNumber} wiped successfully.`);
        // Refresh structural UI layouts arrays
        loadDashboardData();

      } catch(err) {
        alert("Operation Failed: " + err.message);
      }
    }

    // Parse data layers out into downloadable local CSV document sheets layout profiles
    function exportToCSV() {
      if(MASTER_DATASET.length === 0) {
        alert("No tracking structures values loaded to process files output matrices.");
        return;
      }

      const headers = ["Registration Number", "Category", "Name", "WhatsApp", "House Name", "Ward Number", "Ward Name", "Post Office", "Pincode", "Region", "Created At"];
      const rows = MASTER_DATASET.map(r => [
        r.reg_number, r._folder, r.name, r.whatsapp, r.house_name, r.ward_number, r.ward_name, r.post_office, r.pincode, r.region, r.created_at
      ]);

      let csvContent = "data:text/csv;charset=utf-8," 
        + [headers.join(","), ...rows.map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(","))].join("\n");
      
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `ELWOIC_Master_Registry_${new Date().toISOString().split('T')[0]}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
