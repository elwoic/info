<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELWOIC Administration Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <nav class="bg-indigo-900 text-white shadow-md px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center space-x-3">
      <i class="fa-solid fa-shield-halved text-2xl text-indigo-300"></i>
      <span class="text-xl font-bold tracking-wide">ELWOIC Admin Portal</span>
    </div>
    <div class="flex flex-wrap items-center justify-end gap-2.5 w-full md:w-auto">
      <input type="text" id="adminUser" placeholder="Username"
        class="bg-indigo-800 border border-indigo-700 text-sm rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-white w-36">
      <input type="password" id="adminPass" placeholder="Password"
        class="bg-indigo-800 border border-indigo-700 text-sm rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-white w-36">
      <input type="password" id="adminToken" placeholder="System Token"
        class="bg-indigo-800 border border-indigo-700 text-sm rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-white w-36">
      <button onclick="loadDashboardData()"
        class="bg-indigo-500 hover:bg-indigo-400 font-medium text-sm px-4 py-1.5 rounded transition-colors shadow-md cursor-pointer">
        <i class="fa-solid fa-unlock mr-1.5"></i>Login & Fetch
      </button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">

    <!-- Stats -->
    <section class="grid grid-cols-2 md:grid-cols-6 gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Households</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Household" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 330</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Businesses</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Business" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 100</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Farms</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Farm" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 50</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Institutions</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Institution" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 50</span>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Others</span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Other" class="text-2xl font-bold text-slate-800">0</span>
          <span class="text-xs text-slate-400">/ 100</span>
        </div>
      </div>
      <div class="bg-amber-50 p-4 rounded-xl shadow-sm border border-amber-200 flex flex-col justify-between col-span-2 md:col-span-1">
        <span class="text-xs font-bold uppercase tracking-wider text-amber-700 flex items-center">
          <span class="relative flex h-2 w-2 mr-1.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
          </span>
          Updates
        </span>
        <div class="flex items-baseline space-x-2 mt-2">
          <span id="count-Updates" class="text-2xl font-bold text-amber-800">0</span>
          <span class="text-xs text-amber-600">Pending</span>
        </div>
      </div>
    </section>

    <!-- Table -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-5 border-b border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-50/50">
        <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto items-center">
          <div class="relative w-full md:w-72">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="searchBar" oninput="filterTable()" placeholder="Search Name, WhatsApp or ID..."
              class="w-full bg-white border border-slate-300 text-sm rounded-lg pl-9 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <select id="filterFolder" onchange="filterTable()"
            class="w-full md:w-48 bg-white border border-slate-300 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All Categories</option>
            <option value="Household">Household</option>
            <option value="Business">Business</option>
            <option value="Farm">Farm</option>
            <option value="Institution">Institution</option>
            <option value="Other">Other</option>
          </select>
          <select id="filterRegion" onchange="filterTable()"
            class="w-full md:w-36 bg-white border border-slate-300 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All Regions</option>
            <option value="N">North (N)</option>
            <option value="S">South (S)</option>
            <option value="E">East (E)</option>
            <option value="W">West (W)</option>
          </select>
          <select id="filterUpdates" onchange="filterTable()"
            class="w-full md:w-44 bg-amber-50 border border-amber-300 text-amber-900 font-medium text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
            <option value="">All Profiles</option>
            <option value="has_update">⚠️ Has Pending Update</option>
          </select>
        </div>
        <button onclick="exportToCSV()"
          class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm px-4 py-2 rounded-lg transition-colors shadow flex items-center justify-center">
          <i class="fa-solid fa-file-excel mr-2"></i>Export CSV
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-100/70 border-b border-slate-200 text-xs font-semibold uppercase tracking-wider text-slate-500">
              <th class="py-3.5 px-4 w-10"></th>
              <th class="py-3.5 px-4">Reg Number</th>
              <th class="py-3.5 px-4">Name</th>
              <th class="py-3.5 px-4">WhatsApp</th>
              <th class="py-3.5 px-4">Location</th>
              <th class="py-3.5 px-4">Ward / Region</th>
              <th class="py-3.5 px-4">Flags</th>
              <th class="py-3.5 px-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="registrationTableBody" class="divide-y divide-slate-200 text-sm text-slate-600">
            <tr>
              <td colspan="8" class="text-center py-10 text-slate-400">
                <i class="fa-solid fa-key text-2xl mb-2 block"></i>
                Provide credentials at the top and click Login & Fetch.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const WORKER_BASE_URL = "https://elwoic-registration.bold-waterfall-0d01.workers.dev";
    let MASTER_DATASET = [];
    let UPDATE_REQUESTS = {};

    // ── Auth helpers ────────────────────────────────────────────────────────
    function getToken()  { return document.getElementById("adminToken").value.trim(); }
    function getUser()   { return document.getElementById("adminUser").value.trim(); }
    function getPass()   { return document.getElementById("adminPass").value.trim(); }
    function getBasic()  { return btoa(`${getUser()}:${getPass()}`); }

    // Headers for admin routes (need both token + basic auth)
    function adminHeaders(extra = {}) {
      return {
        "X-Admin-Token":  getToken(),
        "Authorization":  `Basic ${getBasic()}`,
        "Content-Type":   "application/json",
        ...extra
      };
    }

    // ── Load all data ───────────────────────────────────────────────────────
    async function loadDashboardData() {
      if (!getUser() || !getPass() || !getToken()) {
        alert("Please provide Username, Password, and System Token.");
        return;
      }

      const tableBody = document.getElementById("registrationTableBody");
      tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-slate-500">
        <i class="fa-solid fa-spinner fa-spin mr-2"></i>Verifying credentials...</td></tr>`;

      try {
        // 1. Fetch registrations via worker
        const regRes = await fetch(`${WORKER_BASE_URL}/admin/all`, {
          method: "GET",
          headers: adminHeaders()
        });
        const regResult = await regRes.json();
        if (!regRes.ok || !regResult.success) throw new Error(regResult.error || "Authentication failed.");

        // 2. Fetch update requests directly from Firebase (using FIREBASE_SECRET = admin password input)
        UPDATE_REQUESTS = {};
        let updateCount = 0;
        try {
          const updatesUrl = `https://administration-protal-default-rtdb.asia-southeast1.firebasedatabase.app/elwoic_update_requests.json?auth=${getToken()}`;
          const updRes = await fetch(updatesUrl);
          if (updRes.ok) {
            const updData = await updRes.json();
            if (updData) {
              Object.values(updData).forEach(req => {
                if (req?.reg_number && req.status === "pending") {
                  UPDATE_REQUESTS[req.reg_number] = req;
                  updateCount++;
                }
              });
            }
          }
        } catch (e) { console.warn("Could not load update requests:", e); }

        document.getElementById("count-Updates").innerText = updateCount;

        // 3. Parse registration data
        MASTER_DATASET = [];
        ["Household","Business","Farm","Institution","Other"].forEach(f => {
          const el = document.getElementById(`count-${f}`);
          if (el) el.innerText = "0";
        });

        if (regResult.data) {
          for (const folder of Object.keys(regResult.data)) {
            const contents = regResult.data[folder];
            if (!contents || typeof contents !== "object") continue;
            let folderCount = 0;
            for (const regId of Object.keys(contents)) {
              if (contents[regId] && typeof contents[regId] === "object") {
                folderCount++;
                MASTER_DATASET.push({ ...contents[regId], _folder: folder });
              }
            }
            const el = document.getElementById(`count-${folder}`);
            if (el) el.innerText = folderCount;
          }
        }

        renderTable(MASTER_DATASET);

      } catch (err) {
        alert("Error: " + err.message);
        tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-rose-500 font-medium">
          <i class="fa-solid fa-circle-exclamation mr-2"></i>${err.message}</td></tr>`;
      }
    }

    // ── Render table ────────────────────────────────────────────────────────
    function renderTable(dataset) {
      const tableBody = document.getElementById("registrationTableBody");
      if (dataset.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-slate-400">No records found.</td></tr>`;
        return;
      }

      tableBody.innerHTML = dataset.map((row, index) => {
        const flags = [];
        if (row.near_riverbank)          flags.push(`<span class="bg-blue-100 text-blue-700 text-[10px] px-1.5 py-0.5 rounded font-medium">River</span>`);
        if (row.severe_waterlogging)     flags.push(`<span class="bg-cyan-100 text-cyan-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Flood</span>`);
        if (row.landslide_prone)         flags.push(`<span class="bg-amber-100 text-amber-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Landslide</span>`);
        if (row.high_altitude)           flags.push(`<span class="bg-purple-100 text-purple-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Alt</span>`);
        if (row.weather_sensitive_setup) flags.push(`<span class="bg-orange-100 text-orange-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Solar</span>`);
        if (row.safe_area)               flags.push(`<span class="bg-emerald-100 text-emerald-700 text-[10px] px-1.5 py-0.5 rounded font-medium">Safe</span>`);

        const formattedDate = row.created_at ? new Date(row.created_at).toLocaleString("en-IN") : "N/A";
        const hasPendingUpdate = !!UPDATE_REQUESTS[row.reg_number];

        const updateBadge = hasPendingUpdate ? `
          <span class="ml-1 inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-800 border border-amber-300 animate-pulse">
            <i class="fa-solid fa-triangle-exclamation mr-1 text-[10px]"></i>UPDATE
          </span>` : "";

        let updatePanel = "";
        if (hasPendingUpdate) {
          const req = UPDATE_REQUESTS[row.reg_number];
          let changesRows = "";
          if (req.changes && typeof req.changes === "object") {
            changesRows = Object.entries(req.changes).map(([field, val]) => `
              <tr class="border-b border-amber-100 text-xs">
                <td class="py-1.5 font-bold text-slate-700 uppercase tracking-tight">${field.replace(/_/g," ")}</td>
                <td class="py-1.5 text-rose-600 line-through">${val.from ?? "—"}</td>
                <td class="py-1.5 text-emerald-700 font-semibold bg-emerald-50/50 px-1">→ ${val.to}</td>
              </tr>`).join("");
          }

          updatePanel = `
            <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-300 rounded-xl p-4 mb-5 shadow-sm space-y-3">
              <div class="flex justify-between items-center border-b border-amber-200 pb-2">
                <div class="flex items-center space-x-2">
                  <i class="fa-solid fa-envelope-open-text text-amber-600"></i>
                  <h4 class="text-amber-900 font-bold text-sm">Pending Update Request</h4>
                </div>
                <span class="text-[10px] text-amber-700 font-mono bg-amber-200 px-2 py-0.5 rounded">App: ${req.app_number}</span>
              </div>
              <p class="text-xs text-slate-700"><span class="font-bold">Reason:</span> "${req.reason || "No reason provided"}"</p>
              <div class="text-xs text-slate-500 font-mono">Requested: ${req.requested_at ? new Date(req.requested_at).toLocaleString("en-IN") : "—"}</div>
              <div class="overflow-x-auto bg-white rounded-lg border border-amber-200 p-2">
                <table class="w-full text-left">
                  <thead>
                    <tr class="text-[10px] uppercase text-slate-400 border-b border-slate-100 font-bold">
                      <th class="pb-1">Field</th><th class="pb-1">Current</th><th class="pb-1">Requested</th>
                    </tr>
                  </thead>
                  <tbody>${changesRows}</tbody>
                </table>
              </div>
              <div class="flex justify-end space-x-3 text-xs pt-1">
                <button onclick="rejectUpdateRequest(event,'${req.app_number}')"
                  class="bg-white hover:bg-rose-50 text-rose-600 border border-rose-300 font-medium px-3 py-1.5 rounded cursor-pointer flex items-center">
                  <i class="fa-solid fa-circle-xmark mr-1"></i> Reject
                </button>
                <button onclick="approveAndMergeUpdate(event,'${req.app_number}','${row.reg_number}','${row._folder}',${index})"
                  class="bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-1.5 rounded cursor-pointer shadow flex items-center">
                  <i class="fa-solid fa-circle-check mr-1.5"></i> Approve & Apply
                </button>
              </div>
            </div>`;
        }

        // Build the editable detail form
        const formHtml = `
          <form id="form-${index}" onsubmit="saveEntryChanges(event,'${row.reg_number}','${row._folder}',${index})" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs text-slate-600">

              <div class="space-y-3 bg-white p-4 rounded-xl border border-slate-200">
                <h4 class="text-indigo-900 font-bold uppercase tracking-wider text-[10px] flex items-center">
                  <i class="fa-solid fa-address-card mr-1.5 text-indigo-500"></i> Personal
                </h4>
                ${editField("Name","name",row.name)}
                ${editField("Occupation","occupation",row.occupation)}
                ${editField("Alt Contact","alt_contact",row.alt_contact)}
                ${editField("Email","email",row.email)}
                ${editField("Registrant Type","registrant_type",row.registrant_type)}
                ${editField("Building Type","building_type",row.building_type)}
                ${editField("Alert Language","alert_language",row.alert_language)}
              </div>

              <div class="space-y-3 bg-white p-4 rounded-xl border border-slate-200">
                <h4 class="text-indigo-900 font-bold uppercase tracking-wider text-[10px] flex items-center">
                  <i class="fa-solid fa-location-dot mr-1.5 text-indigo-500"></i> Location
                </h4>
                ${editField("House Name","house_name",row.house_name)}
                ${editField("Landmark","landmark",row.landmark)}
                ${editField("Ward Number","ward_number",row.ward_number)}
                ${editField("Ward Name","ward_name",row.ward_name)}
                ${editField("Post Office","post_office",row.post_office)}
                ${editField("Pincode","pincode",row.pincode)}
                ${editField("Region (N/S/E/W)","region",row.region)}
                ${editField("Latitude","latitude",row.latitude,"number")}
                ${editField("Longitude","longitude",row.longitude,"number")}
              </div>

              <div class="space-y-3 bg-white p-4 rounded-xl border border-slate-200">
                <h4 class="text-indigo-900 font-bold uppercase tracking-wider text-[10px] flex items-center">
                  <i class="fa-solid fa-triangle-exclamation mr-1.5 text-indigo-500"></i> Risk Flags
                </h4>
                ${checkField("Near Riverbank","near_riverbank",row.near_riverbank)}
                ${checkField("Severe Waterlogging","severe_waterlogging",row.severe_waterlogging)}
                ${checkField("Landslide Prone","landslide_prone",row.landslide_prone)}
                ${checkField("High Altitude","high_altitude",row.high_altitude)}
                ${checkField("Weather Sensitive Setup","weather_sensitive_setup",row.weather_sensitive_setup)}
                ${checkField("Safe Area","safe_area",row.safe_area)}
                <div class="pt-4 border-t border-slate-100 text-[10px] text-slate-400">
                  <i class="fa-regular fa-clock mr-1"></i>Registered: <span class="text-slate-600 font-medium">${formattedDate}</span>
                </div>
              </div>
            </div>

            <div class="flex justify-end items-center space-x-3 pt-3 border-t border-slate-100">
              <button type="button" onclick="toggleRowDetails('details-${index}', document.querySelector('[data-row=\\'${index}\\']'))"
                class="px-3 py-1.5 rounded border border-slate-300 text-slate-600 hover:bg-slate-100 text-xs">Cancel</button>
              <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded font-semibold shadow text-xs flex items-center">
                <i class="fa-solid fa-floppy-disk mr-1.5"></i>Save Changes
              </button>
            </div>
          </form>`;

        return `
          <tr data-row="${index}" onclick="toggleRowDetails('details-${index}',this)"
            class="hover:bg-slate-50/80 transition-colors cursor-pointer border-b border-slate-100 group ${hasPendingUpdate ? "bg-amber-50/20" : ""}">
            <td class="py-3 px-4 text-center text-slate-400 group-hover:text-indigo-600">
              <i class="fa-solid fa-chevron-right text-xs transform transition-transform duration-200 indicator-arrow"></i>
            </td>
            <td class="py-3 px-4 font-mono text-xs text-indigo-900 font-bold">
              <div class="flex items-center flex-wrap gap-1">${row.reg_number}${updateBadge}</div>
            </td>
            <td class="py-3 px-4 font-medium text-slate-900">${row.name}</td>
            <td class="py-3 px-4">
              <a href="https://wa.me/${(row.whatsapp||"").replace(/\D/g,"")}" target="_blank" onclick="event.stopPropagation()"
                class="text-emerald-600 hover:underline inline-flex items-center font-medium">
                <i class="fa-brands fa-whatsapp mr-1 text-sm"></i>${row.whatsapp}
              </a>
            </td>
            <td class="py-3 px-4 text-xs"><span class="font-medium text-slate-800">${row.house_name}</span>, ${row.post_office}</td>
            <td class="py-3 px-4 text-xs">
              Ward ${row.ward_number}
              <span class="ml-1.5 bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded font-bold text-[10px]">${row.region}</span>
            </td>
            <td class="py-3 px-4"><div class="flex flex-wrap gap-1">${flags.join("") || '<span class="text-slate-300 text-xs">—</span>'}</div></td>
            <td class="py-3 px-4 text-right" onclick="event.stopPropagation()">
              <button onclick="deleteEntry('${row.reg_number}','${row._folder}')"
                class="text-rose-500 hover:text-rose-700 p-1.5 rounded hover:bg-rose-50 transition-colors" title="Delete">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </td>
          </tr>
          <tr id="details-${index}" class="hidden bg-slate-50/50">
            <td colspan="8" class="p-6 border-b border-slate-200">
              ${updatePanel}
              ${formHtml}
            </td>
          </tr>`;
      }).join("");
    }

    // ── Field builder helpers ───────────────────────────────────────────────
    function editField(label, name, value, type = "text") {
      return `<div>
        <label class="block font-semibold text-slate-400 mb-1">${label}:</label>
        <input type="${type}" ${type === "number" ? 'step="any"' : ""} name="${name}" value="${value ?? ""}"
          class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 focus:bg-white focus:ring-1 focus:ring-indigo-500 text-slate-900 text-xs">
      </div>`;
    }

    function checkField(label, name, checked) {
      return `<label class="flex items-center space-x-2 cursor-pointer text-[11px] font-medium text-slate-700">
        <input type="checkbox" name="${name}" ${checked ? "checked" : ""} class="rounded text-indigo-600">
        <span>${label}</span>
      </label>`;
    }

    // ── Toggle row expand ───────────────────────────────────────────────────
    function toggleRowDetails(id, rowEl) {
      const detailRow = document.getElementById(id);
      const arrow = rowEl?.querySelector(".indicator-arrow");
      const isHidden = detailRow.classList.contains("hidden");
      detailRow.classList.toggle("hidden", !isHidden);
      arrow?.classList.toggle("rotate-90", isHidden);
      arrow?.classList.toggle("text-indigo-600", isHidden);
    }

    // ── Save changes ────────────────────────────────────────────────────────
    async function saveEntryChanges(event, regNumber, folder, index) {
      event.preventDefault();
      const form = document.getElementById(`form-${index}`);
      const fd   = new FormData(form);

      const updates = {
        name:                    (fd.get("name") || "").trim(),
        occupation:              (fd.get("occupation") || "").trim() || null,
        alt_contact:             (fd.get("alt_contact") || "").trim() || null,
        email:                   (fd.get("email") || "").trim() || null,
        registrant_type:         (fd.get("registrant_type") || "").trim() || null,
        building_type:           (fd.get("building_type") || "").trim(),
        alert_language:          (fd.get("alert_language") || "").trim(),
        house_name:              (fd.get("house_name") || "").trim(),
        landmark:                (fd.get("landmark") || "").trim() || null,
        ward_number:             (fd.get("ward_number") || "").trim(),
        ward_name:               (fd.get("ward_name") || "").trim(),
        post_office:             (fd.get("post_office") || "").trim(),
        pincode:                 (fd.get("pincode") || "").trim(),
        region:                  (fd.get("region") || "").trim().toUpperCase() || null,
        latitude:                fd.get("latitude") ? parseFloat(fd.get("latitude")) : null,
        longitude:               fd.get("longitude") ? parseFloat(fd.get("longitude")) : null,
        near_riverbank:          form.elements["near_riverbank"].checked,
        severe_waterlogging:     form.elements["severe_waterlogging"].checked,
        landslide_prone:         form.elements["landslide_prone"].checked,
        high_altitude:           form.elements["high_altitude"].checked,
        weather_sensitive_setup: form.elements["weather_sensitive_setup"].checked,
        safe_area:               form.elements["safe_area"].checked,
      };

      const submitBtn = form.querySelector('button[type="submit"]');
      const origHtml  = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1.5"></i>Saving...`;

      try {
        const res = await fetch(`${WORKER_BASE_URL}/admin/update?reg_number=${regNumber}&folder=${folder}`, {
          method:  "PATCH",
          headers: adminHeaders(),
          body:    JSON.stringify(updates)
        });
        const result = await res.json();
        if (!res.ok || !result.success) throw new Error(result.error || "Update rejected.");
        alert(`${regNumber} saved successfully.`);
        loadDashboardData();
      } catch (err) {
        alert("Save failed: " + err.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = origHtml;
      }
    }

    // ── Approve & merge update request ──────────────────────────────────────
    async function approveAndMergeUpdate(event, appNumber, regNumber, folder, index) {
      event.preventDefault();
      const req = UPDATE_REQUESTS[regNumber];
      if (!req || !confirm(`Approve and apply changes to ${regNumber}?`)) return;

      // Extract the "to" values from changes object
      const extractedUpdates = {};
      Object.entries(req.changes).forEach(([key, val]) => {
        // GPS stored as "lat, lng" string — split back
        if (key === "gps" && val.to) {
          const parts = val.to.split(",").map(s => parseFloat(s.trim()));
          if (parts.length === 2) {
            extractedUpdates.latitude  = parts[0];
            extractedUpdates.longitude = parts[1];
          }
        } else {
          extractedUpdates[key] = val.to;
        }
      });

      try {
        // Step 1: patch the registration
        const patchRes = await fetch(`${WORKER_BASE_URL}/admin/update?reg_number=${regNumber}&folder=${folder}`, {
          method:  "PATCH",
          headers: adminHeaders(),
          body:    JSON.stringify(extractedUpdates)
        });
        const patchResult = await patchRes.json();
        if (!patchRes.ok || !patchResult.success) throw new Error(patchResult.error || "Patch failed.");

        // Step 2: delete the update request from Firebase
        const delUrl = `https://administration-protal-default-rtdb.asia-southeast1.firebasedatabase.app/elwoic_update_requests/${appNumber}.json?auth=${getToken()}`;
        await fetch(delUrl, { method: "DELETE" });

        alert(`Changes applied to ${regNumber}. Request cleared.`);
        loadDashboardData();
      } catch (err) {
        alert("Approve failed: " + err.message);
      }
    }

    // ── Reject update request ───────────────────────────────────────────────
    async function rejectUpdateRequest(event, appNumber) {
      event.preventDefault();
      if (!confirm("Reject and remove this update request?")) return;
      try {
        const delUrl = `https://administration-protal-default-rtdb.asia-southeast1.firebasedatabase.app/elwoic_update_requests/${appNumber}.json?auth=${getToken()}`;
        const res = await fetch(delUrl, { method: "DELETE" });
        if (!res.ok) throw new Error("Firebase rejected deletion.");
        alert("Update request rejected and removed.");
        loadDashboardData();
      } catch (err) {
        alert("Reject failed: " + err.message);
      }
    }

    // ── Delete registration ─────────────────────────────────────────────────
    async function deleteEntry(regNumber, folder) {
      if (!confirm(`Permanently delete ${regNumber}? This cannot be undone.`)) return;
      try {
        const res = await fetch(`${WORKER_BASE_URL}/admin/delete?reg_number=${regNumber}&folder=${folder}`, {
          method:  "DELETE",
          headers: adminHeaders()
        });
        const result = await res.json();
        if (!res.ok || !result.success) throw new Error(result.error || "Delete rejected.");
        alert(`${regNumber} deleted.`);
        loadDashboardData();
      } catch (err) {
        alert("Delete failed: " + err.message);
      }
    }

    // ── Filter ──────────────────────────────────────────────────────────────
    function filterTable() {
      const query   = document.getElementById("searchBar").value.toLowerCase().trim();
      const folder  = document.getElementById("filterFolder").value;
      const region  = document.getElementById("filterRegion").value;
      const updates = document.getElementById("filterUpdates").value;

      renderTable(MASTER_DATASET.filter(row => {
        const matchQ = !query || row.name.toLowerCase().includes(query) ||
                       (row.whatsapp||"").includes(query) ||
                       row.reg_number.toLowerCase().includes(query);
        const matchF = !folder  || row._folder === folder;
        const matchR = !region  || row.region  === region;
        const matchU = !updates || (updates === "has_update" && UPDATE_REQUESTS[row.reg_number]);
        return matchQ && matchF && matchR && matchU;
      }));
    }

    // ── Export CSV ──────────────────────────────────────────────────────────
    function exportToCSV() {
      if (MASTER_DATASET.length === 0) { alert("No data loaded."); return; }
      const headers = ["Reg Number","Category","Name","WhatsApp","House","Ward No","Ward Name","Post Office","Pincode","Region","Building","Occupation","Registrant Type","Created At"];
      const rows = MASTER_DATASET.map(r => [
        r.reg_number, r._folder, r.name, r.whatsapp, r.house_name, r.ward_number,
        r.ward_name, r.post_office, r.pincode, r.region, r.building_type,
        r.occupation, r.registrant_type, r.created_at
      ]);
      const csv = "data:text/csv;charset=utf-8," +
        [headers, ...rows].map(row =>
          row.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(",")
        ).join("\n");
      const a = document.createElement("a");
      a.href = encodeURI(csv);
      a.download = `ELWOIC_Registry_${new Date().toISOString().split("T")[0]}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
  </script>
